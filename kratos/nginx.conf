worker_processes 1;

events {
  worker_connections 1024;
}

http {
  limit_req_zone $binary_remote_addr zone=kratos_login:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=kratos_recovery:10m rate=5r/m;
  limit_req_status 429;

  upstream kratos_upstream {
    server kratos:4433;
  }

  server {
    listen 80;
    server_name _;

    location = /self-service/login {
      limit_req zone=kratos_login burst=5 nodelay;
      proxy_pass http://kratos_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /self-service/recovery {
      limit_req zone=kratos_recovery burst=5 nodelay;
      proxy_pass http://kratos_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://kratos_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
